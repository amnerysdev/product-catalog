<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/api-store.css">
    <title>Tienda Virtual</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://cdn-icons-png.flaticon.com/512/34/34627.png" alt="Logo" width="30" height="30" class="me-2">
                    Mi Tienda
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                    <a class="nav-link" href="#">Destacados</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="#">Ofertas</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="#">Catálogo</a>
                    </li>
                </ul>
                </div>

    
                
            </div>
        </nav>
    </header>
    <main class="container my-4">
         <!-- Carrusel -->
        <div id="carrusel" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                <img src="..." class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carrusel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carrusel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <!-- Sección Ofertas -->
       <div id="ofertas">
            <h2>Ofertas Especiales</h2>
            
       </div>

       <!-- Catálogo -->
         <div id="catalogo">
            <h2>Catálogo de Productos</h2>
            <div class="row">
                <div class="col-md-4">
                <div class="card">
                    <img src="..." class="card-img-top" alt="...">
                    <div class="card-body">
                    <h5 class="card-title">Título</h5>
                    <p class="card-text">Descripción</p>
                    <p class="card-text">Precio</p>
                    <a href="#" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalDetalles">Ver detalles</a>
                    </div>
                </div>
                </div>
                <!-- Repite más col-md-4 para otros productos -->
            </div>
        </div>


       <!-- Modal -->
       <div class="modal fade" id="modalDetalles" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Título</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Contenido...
            </div>
            </div>
        </div>
    </div>


    </main>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script src="js/api-store.js"></script>
</body>
</html>
